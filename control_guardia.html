<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Guardia — Bomberos Voluntarios de Cañuelas</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --rojo: #B03020; --rojo-light: #FAF0EE; --rojo-borde: #D9A090;
  --gris-bg: #F2F1EF; --gris-borde: #DDDBD6; --gris-texto: #6B6860;
  --gris-input: #F7F6F3; --negro: #1E1D1B; --blanco: #FFFFFF; --radio: 6px;
  --verde: #1E6B45; --verde-light: #E6F4EA; --verde-borde: #5CB87A;
}
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--gris-bg); color: var(--negro); padding-bottom: 4rem; }

/* HEADER */
.header { background: var(--negro); padding: 14px 1.25rem; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
.escudo { width: 36px; height: 36px; background: var(--rojo); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.escudo svg { width: 20px; height: 20px; fill: white; }
.header-txt { flex: 1; }
.header-org { color: white; font-size: 13px; font-weight: 600; line-height: 1.2; }
.header-sub { color: rgba(255,255,255,0.45); font-size: 10px; font-family: 'IBM Plex Mono', monospace; }
.header-btns { display: flex; gap: 6px; }
.hbtn { background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 6px; padding: 7px 12px; font-size: 12px; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; white-space: nowrap; }
.hbtn:hover { background: rgba(255,255,255,0.18); }
.hbtn.primary { background: var(--rojo); }

.content { max-width: 900px; margin: 0 auto; padding: 1rem; }

/* FORM HEAD */
.form-head { background: var(--blanco); border: 1px solid var(--gris-borde); border-radius: 10px; padding: 14px 16px; margin-bottom: 1rem; }
.form-badge { font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; border-radius: 3px; background: var(--rojo-light); color: var(--rojo); border: 1px solid var(--rojo-borde); display: inline-block; margin-bottom: 6px; }
.form-titulo { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
.campos-head { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.campo-h { display: flex; flex-direction: column; gap: 4px; }
.campo-h label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gris-texto); }
.campo-h input, .campo-h select { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; padding: 8px 10px; border: 1px solid var(--gris-borde); border-radius: var(--radio); background: var(--gris-input); color: var(--negro); outline: none; }
.campo-h input:focus, .campo-h select:focus { border-color: var(--rojo); box-shadow: 0 0 0 3px rgba(176,48,32,0.08); }

/* SECCIÓN */
.seccion { background: var(--blanco); border: 1px solid var(--gris-borde); border-radius: 10px; margin-bottom: 1rem; overflow: hidden; }
.sec-titulo { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 9px 14px; background: var(--rojo-light); color: var(--rojo); border-bottom: 1px solid var(--gris-borde); }

/* ESTADO MÓVILES — cards en mobile */
.moviles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; padding: 12px; }
.movil-card { border: 1px solid var(--gris-borde); border-radius: 8px; overflow: hidden; }
.movil-num { background: var(--negro); color: white; font-size: 11px; font-weight: 600; text-align: center; padding: 6px; letter-spacing: 0.05em; }
.movil-estado { padding: 6px; }
.movil-estado select { width: 100%; font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; font-weight: 600; padding: 6px 4px; border: 1px solid var(--gris-borde); border-radius: 4px; background: var(--gris-input); outline: none; cursor: pointer; appearance: none; -webkit-appearance: none; text-align: center; }

/* ITEMS POR MÓVIL — accordeon en mobile */
.categoria { border-bottom: 1px solid var(--gris-borde); }
.categoria:last-child { border-bottom: none; }
.cat-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; cursor: pointer; background: #FAFAF8; user-select: none; }
.cat-header:hover { background: #F5F3F0; }
.cat-nombre { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--rojo); }
.cat-chevron { color: var(--gris-texto); font-size: 12px; transition: transform 0.2s; }
.cat-chevron.open { transform: rotate(180deg); }
.cat-body { display: none; }
.cat-body.open { display: block; }

/* SUB-CATEGORÍA */
.sub-cat { padding: 6px 14px 2px; font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gris-texto); background: var(--rojo-light); border-top: 1px solid var(--gris-borde); }

/* ITEM ROW */
.item-row { padding: 10px 14px; border-top: 1px solid var(--gris-borde); }
.item-nombre { font-size: 13px; font-weight: 500; margin-bottom: 8px; }
.item-moviles { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.item-movil { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.item-movil-num { font-size: 9px; font-weight: 600; color: var(--gris-texto); font-family: 'IBM Plex Mono', monospace; }
.item-movil select { width: 100%; font-size: 10px; padding: 4px 2px; border: 1px solid var(--gris-borde); border-radius: 4px; background: var(--gris-input); outline: none; appearance: none; -webkit-appearance: none; text-align: center; cursor: pointer; }
.item-movil input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--rojo); cursor: pointer; }
.item-movil select:focus { border-color: var(--rojo); }

/* EDILICIO */
.edil-list { padding: 8px 12px; }
.edil-row { display: flex; align-items: center; padding: 8px 4px; border-bottom: 1px solid var(--gris-borde); gap: 8px; }
.edil-row:last-child { border-bottom: none; }
.edil-nombre { flex: 1; font-size: 13px; }
.edil-radios { display: flex; gap: 10px; }
.edil-radio { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.edil-radio label { font-size: 9px; font-weight: 600; color: var(--gris-texto); }
.edil-radio input[type=radio] { width: 18px; height: 18px; accent-color: var(--rojo); cursor: pointer; }

/* COMUNICACIONES */
.com-body { padding: 12px; display: flex; flex-direction: column; gap: 12px; }
.com-row { display: grid; grid-template-columns: 1fr 1fr 2fr; gap: 8px; }
.campo { display: flex; flex-direction: column; gap: 4px; }
.campo label { font-size: 10px; font-weight: 600; color: var(--gris-texto); letter-spacing: 0.04em; text-transform: uppercase; }
.campo input, .campo select, .campo textarea { width: 100%; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; padding: 9px 10px; border: 1px solid var(--gris-borde); border-radius: var(--radio); background: var(--gris-input); color: var(--negro); outline: none; }
.campo input:focus, .campo select:focus, .campo textarea:focus { border-color: var(--rojo); box-shadow: 0 0 0 3px rgba(176,48,32,0.08); }
.campo textarea { resize: vertical; min-height: 60px; line-height: 1.5; }

/* RESPONSABLE */
.resp-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.resp-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; }
.firma-wrap { display: flex; justify-content: flex-end; margin-top: 8px; }
.firma-linea { width: 200px; text-align: center; border-top: 1px solid var(--negro); padding-top: 5px; font-size: 10px; font-weight: 600; color: var(--gris-texto); text-transform: uppercase; letter-spacing: 0.05em; }

/* BOTONES BOTTOM */
.btns-bottom { display: flex; gap: 10px; margin-top: 1rem; }
.btn { flex: 1; padding: 13px; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; font-weight: 600; border: none; border-radius: var(--radio); cursor: pointer; }
.btn-dark { background: var(--negro); color: white; }
.btn-rojo { background: var(--rojo); color: white; }
.btn:hover { opacity: 0.88; }

/* RESPONSIVE */
@media (max-width: 600px) {
  .campos-head { grid-template-columns: 1fr 1fr; }
  .item-moviles { grid-template-columns: repeat(7, 1fr); }
  .item-movil-num { font-size: 8px; }
  .item-movil select { font-size: 9px; padding: 3px 1px; }
  .com-row { grid-template-columns: 1fr 1fr; }
  .com-row .campo:last-child { grid-column: 1 / -1; }
  .resp-grid { grid-template-columns: 1fr; }
  .hbtn span { display: none; }
}

/* PRINT */
@media print {
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  @page { margin: 0; size: A4 portrait; }
  body { background: white; padding: 0; margin: 0; }
  .header { display: none; }
  .btns-bottom { display: none; }
  .cat-body { display: block !important; }
  .cat-chevron { display: none; }

  .content {
    width: 277mm;
    padding: 3mm;
    transform: scale(0.74);
    transform-origin: top left;
    font-size: 8px;
    max-width: none;
  }

  .form-head { padding: 6px 10px; margin-bottom: 4px; border-radius: 0; }
  .form-titulo { font-size: 12px; margin-bottom: 6px; }
  .form-badge { font-size: 6px; margin-bottom: 3px; }
  .campos-head { grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
  .campo-h label { font-size: 6px; }
  .campo-h input, .campo-h select { font-size: 8px; padding: 2px 5px; }

  .seccion { margin-bottom: 3px; border-radius: 0; }
  .sec-titulo { padding: 3px 8px; font-size: 6px; }

  /* Estado móviles en print */
  .moviles-grid { grid-template-columns: repeat(7, 1fr); gap: 3px; padding: 5px 8px; }
  .movil-num { font-size: 7px; padding: 3px; }
  .movil-estado { padding: 3px; }
  .movil-estado select { font-size: 7px; padding: 2px 1px; }

  /* Items */
  .cat-header { padding: 4px 8px; }
  .cat-nombre { font-size: 7px; }
  .sub-cat { padding: 2px 8px; font-size: 6px; }
  .item-row { padding: 3px 8px; }
  .item-nombre { font-size: 8px; margin-bottom: 3px; }
  .item-moviles { grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .item-movil-num { font-size: 6px; }
  .item-movil select { font-size: 7px; padding: 1px; }
  .item-movil input[type=checkbox] { width: 11px; height: 11px; }

  /* Edilicio + comunicaciones en 2 columnas */
  .print-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 4mm; }
  .edil-list { padding: 3px 6px; }
  .edil-row { padding: 3px 2px; }
  .edil-nombre { font-size: 8px; }
  .edil-radio label { font-size: 6px; }
  .edil-radio input[type=radio] { width: 10px; height: 10px; }
  .edil-radios { gap: 6px; }

  .com-body { padding: 5px 8px; gap: 4px; }
  .com-row { gap: 4px; margin-bottom: 0; }
  .campo label { font-size: 6px; }
  .campo input, .campo select, .campo textarea { font-size: 7px; padding: 2px 3px; }
  .campo textarea { min-height: 14px; }

  .resp-body { padding: 5px 8px; gap: 4px; }
  .resp-grid { grid-template-columns: 2fr 1fr 1fr; gap: 4px; }
  .firma-wrap { margin-top: 3px; }
  .firma-linea { font-size: 6px; width: 120px; }
}
</style>
</head>

          </div>
          <div class="com-row">
            <div class="campo"><label>Total bases</label><input type="number" id="cg-bases-total" min="0"></div>
            <div class="campo"><label>Funcionan</label><input type="number" id="cg-bases-func" min="0"></div>
            <div class="campo"><label>Observaciones</label><input type="text" id="cg-bases-obs"></div>
          </div>
        </div>
      </div>

      <!-- OBSERVACIONES -->
      <div class="seccion">
        <div class="sec-titulo">Observaciones generales</div>
        <div style="padding:12px;">

        </div>
      </div>

      <!-- RESPONSABLE -->

        <div class="sec-titulo">Encargado de guardia</div>
        <div class="resp-body">
          <div class="resp-grid">
            <div class="campo"><label>Apellido y nombre</label><select id="cg-responsable"><option value="">— Seleccionar —</option></select></div>
            <div class="campo"><label>Grado</label><input type="text" id="cg-grado" readonly style="background:#F0EEE9;color:var(--gris-texto)"></div>
            <div class="campo"><label>Nº L.P.</label><input type="text" id="cg-lp" readonly style="background:#F0EEE9;color:var(--gris-texto)"></div>
          </div>
          <div class="firma-wrap">
            <div class="firma-linea">Firma y L.P. Encargado de Guardia</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="btns-bottom">
    <button class="btn btn-dark" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
    <button class="btn btn-rojo" onclick="limpiar()">🗑️ Limpiar formulario</button>
  </div>

</div>

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('cg-fecha').valueAsDate = new Date();
  construirMoviles();
  construirItems('items-vehiculos', DATOS.vehiculos, 'sel');
  construirItems('items-herramientas', DATOS.herramientas, 'chk');
  construirItems('items-equipos', DATOS.equipos, 'chk');
  construirEdilicio();
  poblarPersonal();
});

function construirMoviles() {
  var grid = document.getElementById('moviles-grid');
  MOVILES.forEach(function(m) {
    var div = document.createElement('div');
    div.className = 'movil-card';
    div.innerHTML = '<div class="movil-num">Móvil ' + m + '</div>' +
      '<div class="movil-estado"><select id="estado-' + m + '" onchange="colorEstado(this)">' +
      '<option value="">— Estado —</option>' +
      '<option value="EN SERVICIO">✓ En servicio</option>' +
      '<option value="FUERA DE SERVICIO">✗ Fuera de servicio</option>' +
      '</select></div>';
    grid.appendChild(div);
  });
}

function construirItems(containerId, datos, tipo) {
  var container = document.getElementById(containerId);
  Object.keys(datos).forEach(function(sub) {
    var items = datos[sub];
    var catDiv = document.createElement('div');
    catDiv.className = 'categoria';

    var header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = '<span class="cat-nombre">' + (sub || 'Ítems') + '</span><span class="cat-chevron open">▼</span>';
    header.onclick = function() {
      var body = catDiv.querySelector('.cat-body');
      var chev = catDiv.querySelector('.cat-chevron');
      body.classList.toggle('open');
      chev.classList.toggle('open');
    };

    var body = document.createElement('div');
    body.className = 'cat-body open';

    if (sub) {
      var subDiv = document.createElement('div');
      subDiv.className = 'sub-cat';
      subDiv.textContent = sub;
      body.appendChild(subDiv);
    }

    items.forEach(function(item, idx) {
      var row = document.createElement('div');
      row.className = 'item-row';
      var movilesHtml = MOVILES.map(function(m) {
        var id = containerId + '-' + item.replace(/\s/g,'-') + '-m' + m;
        var celda = tipo === 'sel'
          ? '<select id="' + id + '"><option value="">—</option><option value="OK">✓ OK</option><option value="Reg">Reg.</option><option value="Mal">✗ Mal</option></select>'
          : '<input type="checkbox" id="' + id + '">';
        return '<div class="item-movil"><span class="item-movil-num">' + m + '</span>' + celda + '</div>';
      }).join('');
      row.innerHTML = '<div class="item-nombre">' + item + '</div><div class="item-moviles">' + movilesHtml + '</div>';
      body.appendChild(row);
    });

    catDiv.appendChild(header);
    catDiv.appendChild(body);
    container.appendChild(catDiv);
  });
}

function construirEdilicio() {
  var list = document.getElementById('edil-list');
  EDILICIO.forEach(function(item, i) {
    var row = document.createElement('div');
    row.className = 'edil-row';
    row.innerHTML = '<span class="edil-nombre">' + item + '</span>' +
      '<div class="edil-radios">' +
      '<div class="edil-radio"><label>Bien</label><input type="radio" name="edil' + i + '" value="Bien"></div>' +
      '<div class="edil-radio"><label>Regular</label><input type="radio" name="edil' + i + '" value="Regular"></div>' +
      '<div class="edil-radio"><label>Mal</label><input type="radio" name="edil' + i + '" value="Mal"></div>' +
      '</div>';
    list.appendChild(row);
  });
}

function poblarPersonal() {
  var sel = document.getElementById('cg-responsable');
  PERSONAL.forEach(function(p) {
    var o = document.createElement('option');
    o.value = p.n; o.textContent = p.n + ' (' + p.g + ')';
    o.dataset.g = p.g; o.dataset.lp = p.lp;
    sel.appendChild(o);
  });
  sel.addEventListener('change', function() {
    var opt = sel.options[sel.selectedIndex];
    document.getElementById('cg-grado').value = opt.dataset.g || '';
    document.getElementById('cg-lp').value = opt.dataset.lp || '';
  });
}

function colorEstado(sel) {
  if (sel.value === 'EN SERVICIO') {
    sel.style.cssText = 'width:100%;font-family:IBM Plex Sans,sans-serif;font-size:12px;font-weight:600;padding:6px 4px;border:1px solid #5CB87A;border-radius:4px;background:#E6F4EA;color:#1E6B45;outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;text-align:center;';
  } else if (sel.value === 'FUERA DE SERVICIO') {
    sel.style.cssText = 'width:100%;font-family:IBM Plex Sans,sans-serif;font-size:12px;font-weight:600;padding:6px 4px;border:1px solid #D9A090;border-radius:4px;background:#FAF0EE;color:#B03020;outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;text-align:center;';
  } else {
    sel.style.cssText = 'width:100%;font-family:IBM Plex Sans,sans-serif;font-size:12px;font-weight:600;padding:6px 4px;border:1px solid var(--gris-borde);border-radius:4px;background:var(--gris-input);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;text-align:center;';
  }
}

function limpiar() {
  if (!confirm('¿Limpiar todos los datos?')) return;
  document.querySelectorAll('input[type=text],input[type=number],textarea,select').forEach(function(e) { e.value=''; e.style.cssText=''; });
  document.querySelectorAll('input[type=checkbox],input[type=radio]').forEach(function(e) { e.checked=false; });
  document.getElementById('cg-fecha').valueAsDate = new Date();
}
